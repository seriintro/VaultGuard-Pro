<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault - Two-Person Authentication</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="secure-body">
    <div class="secure-container vault-container">
        <div class="header-section">
            <div class="logo-container">
                <i class="fas fa-vault"></i>
            </div>
            <h1>High Security Vault</h1>
            <p class="vault-description">Two-person authentication with face and password required</p>
        </div>
        
        <div class="auth-slots">
            <div id="slot1" class="auth-slot">
                <div class="slot-icon"><i class="fas fa-user-shield"></i></div>
                <h3>Person 1</h3>
                <p class="user-info" id="user1">Not authenticated</p>
                <button id="startAuth1" class="btn btn-primary"><i class="fas fa-fingerprint"></i> Authenticate</button>
            </div>
            
            <div id="slot2" class="auth-slot">
                <div class="slot-icon"><i class="fas fa-user-shield"></i></div>
                <h3>Person 2</h3>
                <p class="user-info" id="user2">Not authenticated</p>
                <button id="startAuth2" class="btn btn-primary"><i class="fas fa-fingerprint"></i> Authenticate</button>
            </div>
        </div>
        
        <div id="authContainer" style="display: none;">
            <div class="camera-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display: none;"></canvas>
                <div class="camera-controls">
                    <button id="captureBtn" class="btn btn-primary"><i class="fas fa-camera"></i> Capture</button>
                    <button id="cancelBtn" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</button>
                </div>
            </div>
            
            <div id="previewContainer" style="display: none;">
                <img id="preview" alt="Captured image">
                <div id="passwordContainer" class="form-group">
                    <label for="password"><i class="fas fa-key"></i> Enter Password:</label>
                    <input type="password" id="password" class="form-control">
                </div>
                <div class="camera-controls">
                    <button id="confirmBtn" class="btn btn-success"><i class="fas fa-check"></i> Confirm</button>
                    <button id="retakeBtn" class="btn btn-secondary"><i class="fas fa-redo"></i> Retake</button>
                </div>
            </div>
        </div>
        
        <div id="timerContainer" class="timer" style="display: none;">
            <i class="fas fa-clock"></i> Authentication window expires in <span id="timerValue">60</span> seconds
        </div>
        
        <div id="statusContainer" class="status-container">
            <p id="statusMessage" class="status-message"></p>
        </div>
        
        <div class="navigation">
            <a href="index.html" class="btn btn-text"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let activeSlot = null;
        let timeoutID = null;
        let secondsRemaining = 60;
        let timerInterval = null;
        
        document.addEventListener('DOMContentLoaded', () => {
            // Set up event listeners for starting authentication
            document.getElementById('startAuth1').addEventListener('click', () => startAuthentication(1));
            document.getElementById('startAuth2').addEventListener('click', () => startAuthentication(2));
            
            // Camera control buttons
            document.getElementById('captureBtn').addEventListener('click', captureProfileImage);
            document.getElementById('cancelBtn').addEventListener('click', cancelAuthentication);
            document.getElementById('confirmBtn').addEventListener('click', confirmAuthentication);
            document.getElementById('retakeBtn').addEventListener('click', retakeImage);
        });
        
        function startAuthentication(slotNumber) {
            activeSlot = slotNumber;
            
            // Show the authentication container
            document.getElementById('authContainer').style.display = 'block';
            
            // Hide both auth buttons
            document.getElementById('startAuth1').style.display = 'none';
            document.getElementById('startAuth2').style.display = 'none';
            
            // Mark active slot
            document.getElementById(`slot${slotNumber}`).classList.add('active');
            
            // Initialize camera
            initCamera('video');
            
            // Update status
            updateStatus('Capture your face for authentication', 'status-pending');
        }
        
        function captureProfileImage() {
            captureImage('video', 'canvas', 'preview');
            document.getElementById('previewContainer').style.display = 'block';
            document.querySelector('.camera-container').style.display = 'none';
        }
        
        function retakeImage() {
            // Clear password field when retaking image
            document.getElementById('password').value = '';
            document.getElementById('previewContainer').style.display = 'none';
            document.querySelector('.camera-container').style.display = 'block';
        }
        
        function cancelAuthentication() {
            resetAuthenticationUI();
        }
        
        function confirmAuthentication() {
            const imageBase64 = document.getElementById('canvas').toDataURL('image/jpeg').split(',')[1];
            const password = document.getElementById('password').value.trim();
            
            // Check if password is provided
            if (!password) {
                updateStatus('Please enter your password', 'status-error');
                return;
            }
            
            verifyVaultAccess(imageBase64, password, activeSlot);
        }
        
        async function verifyVaultAccess(imageBase64, password, slotNumber) {
            updateStatus('Verifying...', 'status-pending');
            
            try {
                const response = await fetch('https://4769-2405-201-4030-a0ee-fd18-5168-30f8-8fe0.ngrok-free.app/api/vault-access', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        image: imageBase64,
                        password: password,
                        slot: slotNumber
                    })
                });
                
                const data = await response.json();
                
                // Process the response
                if (data.status === 'waiting') {
                    // First person authenticated
                    document.getElementById(`user${slotNumber}`).textContent = `${data.user} (Authenticated)`;
                    document.getElementById(`slot${slotNumber}`).classList.add('authenticated');
                    
                    // Show timer
                    startAuthenticationTimer();
                    
                    updateStatus(data.message, 'status-success');
                    
                } else if (data.status === 'success') {
                    // Both users authenticated, access granted
                    document.getElementById(`user${slotNumber}`).textContent = `${data.user} (Authenticated)`;
                    document.getElementById(`slot${slotNumber}`).classList.add('authenticated');
                    
                    // Stop the timer
                    stopAuthenticationTimer();
                    
                    updateStatus(data.message, 'status-success');
                    
                } else {
                    // Authentication failed
                    updateStatus(data.message, 'status-error');
                }
                
                // Reset the UI for next authentication
                resetAuthenticationUI(false);
                
            } catch (error) {
                console.error('Error:', error);
                updateStatus('Connection error. Please try again.', 'status-error');
                resetAuthenticationUI(false);
            }
        }
        
        function resetAuthenticationUI(resetStatus = true) {
            // Reset the camera and UI elements
            stopCamera('video');
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('previewContainer').style.display = 'none';
            document.querySelector('.camera-container').style.display = 'block';
            
            // Clear password field
            document.getElementById('password').value = '';
            
            // Show auth buttons again
            document.getElementById('startAuth1').style.display = 'block';
            document.getElementById('startAuth2').style.display = 'block';
            
            // Remove active class
            if (activeSlot) {
                document.getElementById(`slot${activeSlot}`).classList.remove('active');
            }
            
            if (resetStatus) {
                document.getElementById('statusMessage').textContent = '';
                document.getElementById('statusMessage').className = 'status-message';
            }
            
            activeSlot = null;
        }
        
        function updateStatus(message, className) {
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.textContent = message;
            statusMessage.className = `status-message ${className}`;
        }
        
        function startAuthenticationTimer() {
            document.getElementById('timerContainer').style.display = 'block';
            secondsRemaining = 60; // Reset to 60 seconds
            updateTimerDisplay();
            
            // Clear any existing interval
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            
            timerInterval = setInterval(() => {
                secondsRemaining -= 1;
                updateTimerDisplay();
                
                if (secondsRemaining <= 0) {
                    stopAuthenticationTimer();
                    resetAuthentication();
                }
            }, 1000);
        }
        
        function updateTimerDisplay() {
            document.getElementById('timerValue').textContent = secondsRemaining;
        }
        
        function stopAuthenticationTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            document.getElementById('timerContainer').style.display = 'none';
        }
        
        function resetAuthentication() {
            // Reset the UI for both slots
            document.getElementById('user1').textContent = 'Not authenticated';
            document.getElementById('user2').textContent = 'Not authenticated';
            document.getElementById('slot1').classList.remove('authenticated');
            document.getElementById('slot2').classList.remove('authenticated');
            
            updateStatus('Authentication window expired. Please start again.', 'status-error');
        }
    </script>
</body>
</html>
